[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_pgsql", "php83Extensions.pgsql", "php83Extensions.intl", "php83Extensions.mbstring", "php83Extensions.opcache", "php83Packages.composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = [
  "php bin/console cache:clear --env=prod --no-debug",
  "php bin/console doctrine:migrations:migrate --no-interaction --env=prod"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public/"
